name: Sync Winget Package Index

on:
  schedule:
    - cron: "0 3 * * 0" # Every Sunday at 03:00 UTC
  workflow_dispatch:     # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push data/packages.json back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Download winget source MSIX
        run: |
          curl -fsSL \
            "https://cdn.winget.microsoft.com/cache/source.msix" \
            -o /tmp/source.msix

      - name: Extract index.db from MSIX
        run: |
          unzip -p /tmp/source.msix Public/index.db > /tmp/index.db
          echo "Extracted index.db: $(stat -c '%s' /tmp/index.db) bytes"

      - name: Generate packages.json
        env:
          DB_PATH:  /tmp/index.db
          JSON_OUT: data/packages.json
        run: python scripts/sync_winget.py

      - name: Commit and push packages.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/packages.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: sync winget package index [skip ci]"
          git push
